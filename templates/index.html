<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Violet Pulse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="brand">
                <img class="logo" src="{{ url_for('static', filename='img/violet-pulse.png') }}" alt="Violet Pulse">
                <div class="brand-text">
                    <div class="brand-title">Violet Pulse</div>
                    <div class="brand-subtitle">music hub</div>
                </div>
            </div>

            <div class="header-actions">
                <button class="icon-btn">⚙</button>
            </div>
        </header>

        <main class="content">
            <div class="search-wrap">
                <input type="text" placeholder="Поиск музыки, альбомов, исполнителей">
                <button type="button">🔍</button>
            </div>

            <section class="cards">
                <a href="#" class="card">
                    <div class="card-title">Альбомы</div>
                    <div class="card-text">Открыть коллекцию альбомов</div>
                </a>

                <a href="#" class="card">
                    <div class="card-title">Создать альбом</div>
                    <div class="card-text">Добавить свою подборку</div>
                </a>
            </section>
        </main>

        <footer class="bottom-bar">
            <div class="bottom-left">
                <span class="play-icon">▶</span>
                <div>
                    <div class="bottom-title">Сейчас играет</div>
                    <div class="bottom-subtitle">Список треков</div>
                </div>
            </div>

            <button class="fav-btn">❤ Избранное</button>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='js/learning.js') }}"></script>
</body>
</html>
